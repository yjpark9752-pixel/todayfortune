<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>궁합 테스트 | TodayFortune</title>
    <meta name="description" content="Free zodiac compatibility test! Enter your birthday to check love, friendship & business compatibility.">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TCDG5LDW5W"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-TCDG5LDW5W");</script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,sans-serif;background:linear-gradient(180deg,#0d0d2b 0%,#1a1a4e 40%,#0d0d2b 100%);color:#fff;min-height:100vh}
        .lang-nav{text-align:center;padding:12px;background:rgba(0,0,0,0.4)}
        .lang-nav a{color:#888;text-decoration:none;margin:0 15px;font-size:.9em}
        .lang-nav a.active{color:#ffdd57;font-weight:bold}
        header{text-align:center;padding:35px 20px 15px}
        header h1{font-size:2em;color:#ffdd57;margin-bottom:5px}
        header p{color:#999;font-size:1em}
        .container{max-width:100%;width:100%;margin:20px auto;padding:0 15px;overflow:hidden;box-sizing:border-box}
        .input-box{background:rgba(255,255,255,0.05);border-radius:14px;padding:22px;overflow:hidden;word-break:break-word;margin-bottom:15px;border:1px solid rgba(255,255,255,0.08)}
        .input-box label{display:block;color:#ffdd57;font-weight:bold;margin-bottom:12px;font-size:1.1em}
        .input-box input{width:100%;max-width:100%;padding:14px 12px;box-sizing:border-box;-webkit-appearance:none;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-size:1em}
        .auto-result{margin-top:12px;padding:10px;border-radius:8px;background:rgba(255,221,87,0.1);display:none}
        .auto-result .emoji{font-size:1.5em}
        .auto-result .info{color:#ffdd57;font-weight:bold}
        .check-btn{display:block;width:100%;padding:15px;background:linear-gradient(135deg,#ff6b9d,#c77dff);color:#fff;border:none;border-radius:25px;font-size:1.2em;font-weight:bold;cursor:pointer;margin:20px 0;transition:transform .2s}
        .check-btn:hover{transform:scale(1.03)}
        .check-btn:disabled{opacity:0.5;cursor:not-allowed}
        .result{background:rgba(255,255,255,0.05);border-radius:14px;padding:25px;border:1px solid rgba(255,255,255,0.08);display:none}
        .result h2{color:#ffdd57;text-align:center;margin-bottom:5px}
        .result .big-score{text-align:center;font-size:3em;font-weight:bold;margin:10px 0}
        .score-section{margin:15px 0}
        .score-label{display:flex;justify-content:space-between;font-size:.9em;color:#ccc;margin-bottom:4px}
        .score-bar{height:20px;background:rgba(255,255,255,0.1);border-radius:10px;overflow:hidden;margin-bottom:12px}
        .score-fill{height:100%;border-radius:10px;transition:width 1s}
        .result-text{margin-top:15px;line-height:1.7;color:#ddd;font-size:.95em;text-align:center}
        .share-row{display:flex;justify-content:center;gap:8px;margin-top:15px}
        .share-btn{padding:8px 18px;border-radius:20px;font-size:.85em;text-decoration:none;color:#fff}
        .vs-display{text-align:center;padding:15px;font-size:1.3em}
        .vs-display .emoji{font-size:2em}
        footer{text-align:center;padding:25px;color:#555;font-size:.75em}
        footer a{color:#777;text-decoration:none}
    </style>
</head>
<body>
    <div class="lang-nav">
        <a href="/ko/">Home</a>
        <a href="/ko/compatibility.html" class="active">Compatibility</a>
    </div>
    <header>
        <h1>궁합 테스트</h1>
        <p>생년월일을 입력하고 궁합을 확인하세요!</p>
    </header>
    <div class="container">
        <div class="input-box">
            <label>내 생년월일</label>
            <div style="display:flex;gap:6px"><input type="number" id="myYear" placeholder="년" min="1940" max="2026" style="flex:1;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-size:1em;box-sizing:border-box" onchange="calcSign('my')"><input type="number" id="myMonth" placeholder="월" min="1" max="12" style="flex:1;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-size:1em;box-sizing:border-box" onchange="calcSign('my')"><input type="number" id="myDay" placeholder="일" min="1" max="31" style="flex:1;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-size:1em;box-sizing:border-box" onchange="calcSign('my')"></div>
            <div class="auto-result" id="myResult">
                <span class="emoji" id="myEmoji"></span>
                <span class="info" id="myInfo"></span>
            </div>
        </div>
        <div class="input-box">
            <label>상대 생년월일</label>
            <div style="display:flex;gap:6px"><input type="number" id="partnerYear" placeholder="년" min="1940" max="2026" style="flex:1;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-size:1em;box-sizing:border-box" onchange="calcSign('partner')"><input type="number" id="partnerMonth" placeholder="월" min="1" max="12" style="flex:1;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-size:1em;box-sizing:border-box" onchange="calcSign('partner')"><input type="number" id="partnerDay" placeholder="일" min="1" max="31" style="flex:1;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-size:1em;box-sizing:border-box" onchange="calcSign('partner')"></div>
            <div class="auto-result" id="partnerResult">
                <span class="emoji" id="partnerEmoji"></span>
                <span class="info" id="partnerInfo"></span>
            </div>
        </div>
        <button class="check-btn" id="checkBtn" onclick="checkCompatibility()" disabled>궁합 확인!</button>
        <div class="result" id="result"></div>
    </div>
    <div style="text-align:center;padding:20px"><a href="/ko/" style="color:#ffdd57;text-decoration:none">← 오늘의 운세로 돌아가기</a></div>
    <footer><p>&copy; 2026 TodayFortune.net | <a href="/privacy.html">Privacy</a></p></footer>

    <script>
    const zodiacData=[
        {name:"염소자리",emoji:"♑",start:[1,1],end:[1,19]},
        {name:"물병자리",emoji:"♒",start:[1,20],end:[2,18]},
        {name:"물고기자리",emoji:"♓",start:[2,19],end:[3,20]},
        {name:"양자리",emoji:"♈",start:[3,21],end:[4,19]},
        {name:"황소자리",emoji:"♉",start:[4,20],end:[5,20]},
        {name:"쌍둥이자리",emoji:"♊",start:[5,21],end:[6,20]},
        {name:"게자리",emoji:"♋",start:[6,21],end:[7,22]},
        {name:"사자자리",emoji:"♌",start:[7,23],end:[8,22]},
        {name:"처녀자리",emoji:"♍",start:[8,23],end:[9,22]},
        {name:"천칭자리",emoji:"♎",start:[9,23],end:[10,22]},
        {name:"전갈자리",emoji:"♏",start:[10,23],end:[11,21]},
        {name:"궁수자리",emoji:"♐",start:[11,22],end:[12,21]},
        {name:"염소자리",emoji:"♑",start:[12,22],end:[12,31]}
    ];
    const ttiData=[
        {name:"쥐띠",emoji:"🐭"},{name:"소띠",emoji:"🐮"},{name:"호랑이띠",emoji:"🐯"},
        {name:"토끼띠",emoji:"🐰"},{name:"용띠",emoji:"🐲"},{name:"뱀띠",emoji:"🐍"},
        {name:"말띠",emoji:"🐴"},{name:"양띠",emoji:"🐑"},{name:"원숭이띠",emoji:"🐵"},
        {name:"닭띠",emoji:"🐔"},{name:"개띠",emoji:"🐶"},{name:"돼지띠",emoji:"🐷"}
    ];

    let myData=null, partnerData=null;

    function getZodiac(m,d){
        for(const z of zodiacData){
            const afterStart=m>z.start[0]||(m===z.start[0]&&d>=z.start[1]);
            const beforeEnd=m<z.end[0]||(m===z.end[0]&&d<=z.end[1]);
            if(afterStart&&beforeEnd)return z;
        }
        return zodiacData[0];
    }

    function getTti(year){
        const idx=(year-4)%12;
        return ttiData[idx>=0?idx:idx+12];
    }

    function calcSign(who){
        
                
        const pfx=who==='my'?'my':'partner';const year=parseInt(document.getElementById(pfx+'Year').value),month=parseInt(document.getElementById(pfx+'Month').value),day=parseInt(document.getElementById(pfx+'Day').value);if(!year||!month||!day)return;
        const zodiac=getZodiac(month,day);
        const tti=getTti(year);

        const data={zodiac,tti,year,month,day};
        if(who==='my')myData=data; else partnerData=data;

        const resultDiv=document.getElementById(who==='my'?'myResult':'partnerResult');
        const emojiEl=document.getElementById(who==='my'?'myEmoji':'partnerEmoji');
        const infoEl=document.getElementById(who==='my'?'myInfo':'partnerInfo');

        emojiEl.textContent=zodiac.emoji+' '+tti.emoji;
        infoEl.textContent=` ${zodiac.name} + ${tti.name} (${year})`;
        resultDiv.style.display='block';

        document.getElementById('checkBtn').disabled=!(myData&&partnerData);
    }

    function checkCompatibility(){
        if(!myData||!partnerData)return;
        const m=myData, p=partnerData;

        // Calculate scores based on zodiac + tti combination
        const seed=(m.zodiac.name+p.zodiac.name+m.tti.name+p.tti.name).split('').reduce((a,c)=>a+c.charCodeAt(0),0);
        const r=n=>Math.max(25,Math.min(99,((seed*n+37)%75)+25));
        const love=r(7), friend=r(13), biz=r(23);
        const total=Math.round((love*0.4+friend*0.3+biz*0.3));

        const color=total>75?'#ff6b9d':total>50?'#ffdd57':'#4ecdc4';

        const tips=[
            `${m.zodiac.name} 의 만남! 서로를 끌어당기는 매력적인 조합이에요. 서로의 에너지가 아름답게 균형을 이룹니다!`,
            `서로에 대한 존중이 빛나는 조합이에요. 상호 보완적인 강점을 가지고 있습니다!`,
            `${m.tti.name} 의 만남은 흥미로운 에너지를 만들어요! 직관이 이 관계를 이끌어갑니다.`,
            `함께하면 소통이 슈퍼파워가 되는 조합이에요!`,
            `${m.tti.name}'s 의 결단력과 창의성이 만나 특별한 케미를 만들어요!`,
        ];
        const tip=tips[seed%tips.length];

        const d=document.getElementById('result');
        d.style.display='block';
        d.innerHTML=`
            <div class="vs-display">
                <span class="emoji">${m.zodiac.emoji}${m.tti.emoji}</span>
                <span style="color:#ff6b9d;margin:0 10px">♥</span>
                <span class="emoji">${p.zodiac.emoji}${p.tti.emoji}</span>
            </div>
            <h2>${m.zodiac.name} & ${p.zodiac.name}</h2>
            <h2 style="font-size:.9em;color:#aaa">${m.tti.name} & ${p.tti.name}</h2>
            <div class="big-score" style="color:${color}">${total}%</div>
            <div class="score-section">
                <div class="score-label"><span>사랑</span><span>${love}%</span></div>
                <div class="score-bar"><div class="score-fill" style="width:${love}%;background:#ff6b9d"></div></div>
                <div class="score-label"><span>우정</span><span>${friend}%</span></div>
                <div class="score-bar"><div class="score-fill" style="width:${friend}%;background:#4ecdc4"></div></div>
                <div class="score-label"><span>비즈니스</span><span>${biz}%</span></div>
                <div class="score-bar"><div class="score-fill" style="width:${biz}%;background:#a29bfe"></div></div>
            </div>
            <div class="result-text">${tip}</div>
            <div class="share-row">
                <a class="share-btn" style="background:#1DA1F2" href="https://twitter.com/intent/tweet?text=${encodeURIComponent(`My compatibility with my partner: ${total}%! ${m.zodiac.name}(${m.tti.name}) × ${p.zodiac.name}(${p.tti.name}) #TodayFortune #zodiac`)}&url=https://todayfortune.net/compatibility.html" target="_blank">Twitter</a>
                <a class="share-btn" style="background:#000;border:1px solid #333" href="https://www.threads.net/intent/post?text=${encodeURIComponent(`My compatibility: ${total}%! ${m.zodiac.emoji}${m.tti.emoji} × ${p.zodiac.emoji}${p.tti.emoji} #TodayFortune`)}" target="_blank">Threads</a>
            </div>
        `;
        d.scrollIntoView({behavior:'smooth'});
    }
    </script>
</body>
</html>
