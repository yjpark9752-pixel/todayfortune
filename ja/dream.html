    <script>
        const API_KEY = atob('QUl6YVN5Qlg5eHpLOFpuOVdXd2pFLUhZQUdzZ2FVdmlNa2JkSDRn');
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;

        const params = new URLSearchParams(window.location.search);
        const qDream = params.get('q');
        if (qDream) {
            document.getElementById('dreamText').value = decodeURIComponent(qDream);
            document.getElementById('interpretBtn').textContent = '🔮 夢を診断する';
        }

        async function interpretDream() {
            const dreamText = document.getElementById('dreamText').value.trim();
            if (!dreamText) { document.getElementById('dreamText').focus(); return; }

            document.getElementById('spinner').classList.add('active');
            document.getElementById('resultCard').classList.remove('active');
            document.getElementById('errorMsg').classList.remove('active');
            document.getElementById('interpretBtn').disabled = true;

            const prompt = `あなたは神秘的な夢占い師です。以下の夢を分析し、有効なJSONオブジェクトのみで回答してください（マークダウンやコードフェンスなし）。JSONには以下のフィールドが必要です：
- "meaning": 夢の詳細な解釈（日本語で2〜3文）
- "lucky_numbers": 夢にインスピレーションを受けた1〜43の間のユニークな整数6個の配列
- "lucky_color": 夢にインスピレーションを受けた色の名前（日本語）
- "advice": 夢の象徴に基づく実践的なアドバイス（日本語で1〜2文）

夢の内容: "${dreamText.replace(/"/g, '\\"')}"`;

            try {
                const resp = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                if (!resp.ok) throw new Error('API error');
                const data = await resp.json();
                const text = data.candidates[0].content.parts[0].text;
                const cleaned = text.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
                const result = JSON.parse(cleaned);
                displayResult(result);
            } catch (e) {
                console.error(e);
                document.getElementById('errorMsg').classList.add('active');
            } finally {
                document.getElementById('spinner').classList.remove('active');
                document.getElementById('interpretBtn').disabled = false;
            }
        }

        function displayResult(r) {
            document.getElementById('resultMeaning').textContent = r.meaning;
            document.getElementById('resultNumbers').innerHTML = r.lucky_numbers.map(n => `<div class="lucky-ball">${n}</div>`).join('');
            document.getElementById('resultColor').textContent = '🎨 ' + r.lucky_color;
            document.getElementById('resultAdvice').textContent = r.advice;
            document.getElementById('resultCard').classList.add('active');
            document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
            updateFacebookShare();
        }

        function copyShareLink() {
            const dream = document.getElementById('dreamText').value.trim();
            const url = `${window.location.origin}/ja/dream.html?q=${encodeURIComponent(dream)}`;
            navigator.clipboard.writeText(url).then(() => {
                const btn = document.querySelector('.share-copy');
                btn.textContent = '✅ コピーしました！';
                setTimeout(() => btn.textContent = '📋 リンクをコピー', 2000);
            });
        }

        function updateFacebookShare() {
            const meaning = document.getElementById('resultMeaning').textContent || '';
            const fb = document.getElementById('shareFacebook');
            fb.href = `https://www.facebook.com/sharer/sharer.php?u=https://todayfortune.net/ja/dream.html&quote=${encodeURIComponent('夢占い: ' + meaning.slice(0,80) + '...')}`;
        }

        function shareTwitter() {
            const dream = document.getElementById('dreamText').value.trim();
            const url = `${window.location.origin}/ja/dream.html?q=${encodeURIComponent(dream)}`;
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent('夢占いの結果をチェック！🌙')}&url=${encodeURIComponent(url)}`, '_blank');
        }
        function shareThreads() {
            const dream = document.getElementById('dreamText').value.trim();
            const url = `${window.location.origin}/ja/dream.html?q=${encodeURIComponent(dream)}`;
            window.open(`https://www.threads.net/intent/post?text=${encodeURIComponent('夢占いの結果をチェック！🌙 ' + url)}`, '_blank');
        }
    </script>
