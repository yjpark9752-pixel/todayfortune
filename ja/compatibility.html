    <header>

    <div class="container">
        <div class="input-box">
            <label>あなたの生年月日</label>
            <div style="display:flex;gap:6px"><input type="number" id="myYear" placeholder="年" min="1940" max="2026" style="flex:1;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-size:1em;box-sizing:border-box" onchange="calcSign('my')"><input type="number" id="myMonth" placeholder="月" min="1" max="12" style="flex:1;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-size:1em;box-sizing:border-box" onchange="calcSign('my')"><input type="number" id="myDay" placeholder="日" min="1" max="31" style="flex:1;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-size:1em;box-sizing:border-box" onchange="calcSign('my')"></div>
            <div class="auto-result" id="myResult">
                <span class="emoji" id="myEmoji"></span>
                <span class="info" id="myInfo"></span>
            </div>
        </div>
        <div class="input-box">
            <label>相手の生年月日</label>
            <div style="display:flex;gap:6px"><input type="number" id="partnerYear" placeholder="年" min="1940" max="2026" style="flex:1;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-size:1em;box-sizing:border-box" onchange="calcSign('partner')"><input type="number" id="partnerMonth" placeholder="月" min="1" max="12" style="flex:1;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-size:1em;box-sizing:border-box" onchange="calcSign('partner')"><input type="number" id="partnerDay" placeholder="日" min="1" max="31" style="flex:1;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-size:1em;box-sizing:border-box" onchange="calcSign('partner')"></div>
            <div class="auto-result" id="partnerResult">
                <span class="emoji" id="partnerEmoji"></span>
                <span class="info" id="partnerInfo"></span>
            </div>
        </div>
        <button class="check-btn" id="checkBtn" onclick="checkCompatibility()" disabled>相性をチェック！</button>

    <script>
    const zodiacData=[
        {name:"山羊座",emoji:"♑",start:[1,1],end:[1,19]},
        {name:"水瓶座",emoji:"♒",start:[1,20],end:[2,18]},
        {name:"魚座",emoji:"♓",start:[2,19],end:[3,20]},
        {name:"牡羊座",emoji:"♈",start:[3,21],end:[4,19]},
        {name:"牡牛座",emoji:"♉",start:[4,20],end:[5,20]},
        {name:"双子座",emoji:"♊",start:[5,21],end:[6,20]},
        {name:"蟹座",emoji:"♋",start:[6,21],end:[7,22]},
        {name:"獅子座",emoji:"♌",start:[7,23],end:[8,22]},
        {name:"乙女座",emoji:"♍",start:[8,23],end:[9,22]},
        {name:"天秤座",emoji:"♎",start:[9,23],end:[10,22]},
        {name:"蠍座",emoji:"♏",start:[10,23],end:[11,21]},
        {name:"射手座",emoji:"♐",start:[11,22],end:[12,21]},
        {name:"山羊座",emoji:"♑",start:[12,22],end:[12,31]}
    ];
    const ttiData=[
        {name:"ネズミ年",emoji:"🐭"},{name:"牛年",emoji:"🐮"},{name:"トラ年",emoji:"🐯"},
        {name:"うさぎ年",emoji:"🐰"},{name:"龍年",emoji:"🐲"},{name:"ヘビ年",emoji:"🐍"},
        {name:"馬年",emoji:"🐴"},{name:"羊年",emoji:"🐑"},{name:"猿年",emoji:"🐵"},
        {name:"鶏年",emoji:"🐔"},{name:"犬年",emoji:"🐶"},{name:"豚年",emoji:"🐷"}
    ];

    let myData=null, partnerData=null;

    function getZodiac(m,d){
        for(const z of zodiacData){
            const afterStart=m>z.start[0]||(m===z.start[0]&&d>=z.start[1]);
            const beforeEnd=m<z.end[0]||(m===z.end[0]&&d<=z.end[1]);
            if(afterStart&&beforeEnd)return z;
        }
        return zodiacData[0];
    }

    function getTti(year){
        const idx=(year-4)%12;
        return ttiData[idx>=0?idx:idx+12];
    }

    function calcSign(who){
        
                
        const pfx=who==='my'?'my':'partner';const year=parseInt(document.getElementById(pfx+'Year').value),month=parseInt(document.getElementById(pfx+'Month').value),day=parseInt(document.getElementById(pfx+'Day').value);if(!year||!month||!day)return;
        const zodiac=getZodiac(month,day);
        const tti=getTti(year);

        const data={zodiac,tti,year,month,day};
        if(who==='my')myData=data; else partnerData=data;

        const resultDiv=document.getElementById(who==='my'?'myResult':'partnerResult');
        const emojiEl=document.getElementById(who==='my'?'myEmoji':'partnerEmoji');
        const infoEl=document.getElementById(who==='my'?'myInfo':'partnerInfo');

        emojiEl.textContent=zodiac.emoji+' '+tti.emoji;
        infoEl.textContent=` ${zodiac.name} + ${tti.name} (${year})`;
        resultDiv.style.display='block';

        document.getElementById('checkBtn').disabled=!(myData&&partnerData);
    }

    
        const loveTips=['深い感情的なつながりがあります。お互いのニーズを直感的に理解し、温かい絆を築いていきます。','二人の間には強い引力があります。ケミストリーは否定できず、情熱が自然に流れます。','この組み合わせでは、愛はゆっくりですが確実に育ちます。時間をかければ美しい深さを発見できます。','お互いのロマンチックな面を最大限に引き出す組み合わせです。時の試練に耐える愛です。','愛の言語が異なるかもしれませんが、努力がすべての違いを生みます。コミュニケーションが鍵です。'];
        const friendTips=['友人として、誰もが羨むダイナミックデュオです。一緒にいるエネルギーは周りに伝染します。','相互の信頼と尊敬の上に築かれた友情です。どんな状況でもお互いを頼りにできます。','お互いに成長を促す関係で、刺激的で意味のある友情です。','一緒にいると笑いが絶えません。本当の喜びをもたらす友情です。','お互いを完璧に補完します - 一方が弱いところで他方が強いです。'];
        const bizTips=['ビジネスでは強力なチームを組みます。合わせたスキルが成功のすべての基盤をカバーします。','プロフェッショナルなケミストリーが優れています。一緒なら不可能に見えるプロジェクトも達成できます。','二人のビジネスベンチャーには大きな可能性があります。お互いの判断を信じて挑戦しましょう。','リスクと慎重さのバランスが良い組み合わせです。賢明で戦略的なビジネス決定に強いです。','仕事のスタイルが異なるかもしれませんが、それが強みです。異なる視点がより良い結果を生みます。'];

        function checkCompatibility(){
        if(!myData||!partnerData)return;
        const m=myData, p=partnerData;

        // Calculate scores based on zodiac + tti combination
        const seed=(m.zodiac.name+p.zodiac.name+m.tti.name+p.tti.name).split('').reduce((a,c)=>a+c.charCodeAt(0),0);
        const r=n=>Math.max(25,Math.min(99,((seed*n+37)%75)+25));
        const love=r(7), friend=r(13), biz=r(23);
        const total=Math.round((love*0.4+friend*0.3+biz*0.3));

        const color=total>75?'#ff6b9d':total>50?'#ffdd57':'#4ecdc4';

        
        

        const d=document.getElementById('result');
        d.style.display='block';
        d.innerHTML=`
            <div class="vs-display">
                <span class="emoji">${m.zodiac.emoji}${m.tti.emoji}</span>
                <span style="color:#ff6b9d;margin:0 10px">♥</span>
                <span class="emoji">${p.zodiac.emoji}${p.tti.emoji}</span>
            </div>
            <h2>${m.zodiac.name} & ${p.zodiac.name}</h2>
            <h2 style="font-size:.9em;color:#aaa">${m.tti.name} & ${p.tti.name}</h2>
            <div class="big-score" style="color:${color}">${total}%</div>
            <div class="score-section">
                <div class="score-label"><span>恋愛</span><span>${love}%</span></div>
                <div class="score-bar"><div class="score-fill" style="width:${love}%;background:#ff6b9d"></div></div>
                <div class="score-label"><span>友情</span><span>${friend}%</span></div>
                <div class="score-bar"><div class="score-fill" style="width:${friend}%;background:#4ecdc4"></div></div>
                <div class="score-label"><span>ビジネス</span><span>${biz}%</span></div>
                <div class="score-bar"><div class="score-fill" style="width:${biz}%;background:#a29bfe"></div></div>
            </div>
            <div class="result-text">
                <p style="margin-bottom:10px"><b style="color:#ff6b9d">恋愛:</b> ${loveTips[seed%loveTips.length]}</p>
                <p style="margin-bottom:10px"><b style="color:#4ecdc4">友情:</b> ${friendTips[seed%friendTips.length]}</p>
                <p><b style="color:#a29bfe">ビジネス:</b> ${bizTips[seed%bizTips.length]}</p>
            </div>
            <div class="share-row">
                <a class="share-btn" style="background:#1DA1F2" href="https://twitter.com/intent/tweet?text=${encodeURIComponent(`相性 ${total}%! ${m.zodiac.name} × ${p.zodiac.name} #TodayFortune #相性`)}&url=https://todayfortune.net/ja/compatibility.html" target="_blank">Twitter</a>
                <a class="share-btn" style="background:#000;border:1px solid #333" href="https://www.threads.net/intent/post?text=${encodeURIComponent(`相性 ${total}%! ${m.zodiac.emoji}${m.tti.emoji} × ${p.zodiac.emoji}${p.tti.emoji} #TodayFortune`)}" target="_blank">Threads</a>
                <a class="share-btn" style="background:#06C755" href="https://line.me/R/share?text=${encodeURIComponent(`私たちの相性を占ってみたら結果がすごかった！😍 チェックしてみて 👉 https://todayfortune.net/ja/compatibility.html`)}" target="_blank">LINE</a>
                <a class="share-btn" style="background:linear-gradient(135deg,#ff6b9d,#c77dff)" href="sms:?body=${encodeURIComponent(`私たちの相性を占ってみたら結果がすごかった！😍 チェックしてみて 👉 https://todayfortune.net/ja/compatibility.html`)}" target="_blank">💌 相手に送る</a>
            </div>
        `;
        d.scrollIntoView({behavior:'smooth'});
    }
    </script>
