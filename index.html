<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today's Horoscope & Lucky Numbers | TodayFortune</title>
    <meta name="description" content="Free daily horoscope for all 12 zodiac signs with Mega Millions lucky numbers. Updated every day!">
    <meta name="keywords" content="horoscope, daily horoscope, zodiac, astrology, mega millions, lucky numbers, today horoscope">
    <link rel="alternate" hreflang="ja" href="/ja/">
    <link rel="alternate" hreflang="ko" href="/ko/">
    <link rel="alternate" hreflang="en" href="/">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 50%, #0a0a2e 100%);
            color: #fff;
            min-height: 100vh;
        }
        header {
            text-align: center;
            padding: 40px 20px 20px;
            background: rgba(0,0,0,0.3);
        }
        header h1 {
            font-size: 2.5em;
            color: #ffdd57;
            margin-bottom: 10px;
        }
        header p { color: #aaa; font-size: 1.1em; }
        .date { color: #ffdd57; font-size: 1.2em; margin-top: 10px; }
        .lang-nav {
            text-align: center;
            padding: 10px;
            background: rgba(0,0,0,0.2);
        }
        .lang-nav a {
            color: #aaa;
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.9em;
        }
        .lang-nav a.active { color: #ffdd57; font-weight: bold; }
        .signs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            padding: 30px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .sign-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s;
        }
        .sign-card:hover { transform: translateY(-5px); }
        .sign-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .sign-emoji { font-size: 2.5em; }
        .sign-name { font-size: 1.5em; color: #ffdd57; }
        .sign-dates { color: #888; font-size: 0.9em; }
        .sign-content { line-height: 1.7; margin-bottom: 15px; color: #ddd; }
        .sign-advice {
            background: rgba(255,221,87,0.1);
            border-left: 3px solid #ffdd57;
            padding: 10px 15px;
            margin-bottom: 15px;
            border-radius: 0 8px 8px 0;
        }
        .sign-advice-label { color: #ffdd57; font-weight: bold; font-size: 0.9em; }
        .lucky-info {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .lucky-tag {
            background: rgba(255,221,87,0.15);
            color: #ffdd57;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
        }
        .youtube-cta {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255,221,87,0.05);
        }
        .youtube-cta a {
            display: inline-block;
            background: #ff0000;
            color: #fff;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: bold;
        }
        footer {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 0.8em;
        }
        footer a { color: #888; }
        @media (max-width: 600px) {
            header h1 { font-size: 1.8em; }
            .signs-grid { grid-template-columns: 1fr; padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="lang-nav">
        <a href="/" class="active">English</a>
        <a href="/ja/">日本語</a>
        <a href="/ko/">한국어</a>
    </div>
    <header>
        <h1>Today's Horoscope</h1>
        <p>Daily horoscope for all 12 zodiac signs with Mega Millions lucky numbers</p>
        <div class="date" id="today-date"></div>
    </header>

    <div class="tab-nav">
        <button class="active" onclick="loadTab('zodiac', this)" style="background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2);padding:10px 25px;margin:0 5px;border-radius:25px;cursor:pointer;font-size:1em;">Zodiac Signs</button>
        <button onclick="loadTab('tti', this)" style="background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2);padding:10px 25px;margin:0 5px;border-radius:25px;cursor:pointer;font-size:1em;">Korean Animal Zodiac</button>
    </div>

    <div class="signs-grid" id="horoscopes">
        <div class="sign-card">
            <p style="text-align:center; color:#888; padding:40px;">Loading today's horoscopes...</p>
        </div>
    </div>

    <div class="youtube-cta">
        <p style="margin-bottom:15px; color:#ddd;">Watch daily horoscope videos!</p>
        <a href="https://www.youtube.com/@DailyZodiacFortune" target="_blank">Subscribe on YouTube</a>
    </div>

    <footer>
        <p>&copy; 2026 TodayFortune.net | <a href="/ja/">日本語</a> | <a href="/ko/">한국어</a></p>
        <p style="margin-top:10px;">For entertainment purposes only.</p>
    </footer>

    <script>
        // Display today's date
        const today = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('today-date').textContent = today.toLocaleDateString('en-US', options);

        function loadTab(type, el) {
            document.querySelectorAll('.tab-nav button').forEach(b => {
                b.style.background = 'rgba(255,255,255,0.1)';
                b.style.color = '#fff';
                b.style.borderColor = 'rgba(255,255,255,0.2)';
            });
            if (el) { el.style.background = '#ffdd57'; el.style.color = '#000'; el.style.borderColor = '#ffdd57'; }
            const file = type === 'tti' ? './data/en_tti.json' : './data/en.json';
            fetch(file)
                .then(r => r.json())
                .then(data => {
                    const grid = document.getElementById('horoscopes');
                    grid.innerHTML = data.map(h => `
                        <div class="sign-card">
                            <div class="sign-header">
                                <span class="sign-emoji">${h.emoji || ''}</span>
                                <div>
                                    <div class="sign-name">${h.name}</div>
                                    <div class="sign-dates">${h.dates || h.years || ''}</div>
                                </div>
                            </div>
                            <div class="sign-content">${h.content}</div>
                            <div class="sign-advice">
                                <div class="sign-advice-label">Daily Advice</div>
                                ${h.advice}
                            </div>
                            <div class="lucky-info">
                                <span class="lucky-tag">Lucky Numbers: ${Array.isArray(h.lucky_numbers) ? h.lucky_numbers.join(', ') : h.lucky_numbers}</span>
                                ${h.lucky_color ? `<span class="lucky-tag">Color: ${h.lucky_color}</span>` : ''}
                            </div>
                        </div>
                    `).join('');
                })
                .catch(() => {
                    document.getElementById('horoscopes').innerHTML = '<p style="text-align:center;color:#888;padding:40px;">Horoscopes will be available soon!</p>';
                });
        }
        loadTab('zodiac', document.querySelector('.tab-nav button'));
    </script>
</body>
</html>
