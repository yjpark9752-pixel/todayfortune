<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zodiac Compatibility Test | TodayFortune</title>
    <meta name="description" content="Free zodiac compatibility test! Check love, friendship & business compatibility with your partner.">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TCDG5LDW5W"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-TCDG5LDW5W");</script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,sans-serif;background:linear-gradient(180deg,#0d0d2b 0%,#1a1a4e 40%,#0d0d2b 100%);color:#fff;min-height:100vh}
        .lang-nav{text-align:center;padding:12px;background:rgba(0,0,0,0.4)}
        .lang-nav a{color:#888;text-decoration:none;margin:0 15px;font-size:.9em}
        .lang-nav a.active{color:#ffdd57;font-weight:bold}
        header{text-align:center;padding:35px 20px 15px}
        header h1{font-size:2em;color:#ffdd57;margin-bottom:5px}
        header p{color:#999;font-size:1em}
        .container{max-width:600px;margin:20px auto;padding:0 20px}
        .selector{background:rgba(255,255,255,0.05);border-radius:14px;padding:25px;margin-bottom:15px;border:1px solid rgba(255,255,255,0.08)}
        .selector label{display:block;color:#ffdd57;font-weight:bold;margin-bottom:10px;font-size:1.1em}
        .type-toggle{display:flex;gap:8px;margin-bottom:15px}
        .type-toggle button{flex:1;padding:8px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.05);color:#ccc;cursor:pointer;font-size:.9em}
        .type-toggle button.active{background:#ffdd57;color:#111;border-color:#ffdd57;font-weight:bold}
        .sign-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
        .sign-btn{padding:10px 5px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:#ccc;cursor:pointer;text-align:center;font-size:.85em;transition:all .2s}
        .sign-btn:hover{background:rgba(255,255,255,0.1)}
        .sign-btn.selected{background:rgba(255,221,87,0.2);border-color:#ffdd57;color:#ffdd57;font-weight:bold}
        .sign-btn .emoji{display:block;font-size:1.5em;margin-bottom:3px}
        .check-btn{display:block;width:100%;padding:15px;background:linear-gradient(135deg,#ff6b9d,#c77dff);color:#fff;border:none;border-radius:25px;font-size:1.2em;font-weight:bold;cursor:pointer;margin:20px 0;transition:transform .2s}
        .check-btn:hover{transform:scale(1.03)}
        .check-btn:disabled{opacity:0.5;cursor:not-allowed}
        .result{background:rgba(255,255,255,0.05);border-radius:14px;padding:25px;border:1px solid rgba(255,255,255,0.08);display:none}
        .result h2{color:#ffdd57;text-align:center;margin-bottom:15px}
        .score-bar{height:20px;background:rgba(255,255,255,0.1);border-radius:10px;margin:8px 0;overflow:hidden}
        .score-fill{height:100%;border-radius:10px;transition:width 1s}
        .score-label{display:flex;justify-content:space-between;font-size:.9em;color:#ccc}
        .result-text{margin-top:15px;line-height:1.7;color:#ddd;font-size:.95em}
        .share-btn{display:inline-block;margin-top:15px;padding:10px 25px;background:rgba(255,255,255,0.1);color:#fff;border-radius:20px;text-decoration:none;font-size:.9em}
        footer{text-align:center;padding:25px;color:#555;font-size:.75em}
        footer a{color:#777;text-decoration:none}
    </style>
</head>
<body>
    <div class="lang-nav">
        <a href="/">Home</a>
        <a href="/compatibility.html" class="active">Compatibility</a>
    </div>
    <header>
        <h1>Zodiac Compatibility</h1>
        <p>Check your love, friendship & business compatibility!</p>
    </header>
    <div class="container">
        <div class="selector">
            <label>You</label>
            <div class="type-toggle">
                <button class="active" onclick="switchType('me','zodiac',this)">Zodiac</button>
                <button onclick="switchType('me','tti',this)">Korean Animal</button>
            </div>
            <div class="sign-grid" id="me-signs"></div>
        </div>
        <div class="selector">
            <label>Partner</label>
            <div class="type-toggle">
                <button class="active" onclick="switchType('partner','zodiac',this)">Zodiac</button>
                <button onclick="switchType('partner','tti',this)">Korean Animal</button>
            </div>
            <div class="sign-grid" id="partner-signs"></div>
        </div>
        <button class="check-btn" id="checkBtn" onclick="checkCompatibility()" disabled>Check Compatibility!</button>
        <div class="result" id="result"></div>
    </div>
    <div style="text-align:center;padding:20px"><a href="/" style="color:#ffdd57;text-decoration:none">← Back to Today's Horoscope</a></div>
    <footer><p>&copy; 2026 TodayFortune.net | <a href="/privacy.html">Privacy</a></p></footer>

    <script>
    const zodiacSigns=[
        {name:"Aries",emoji:"♈"},{name:"Taurus",emoji:"♉"},{name:"Gemini",emoji:"♊"},
        {name:"Cancer",emoji:"♋"},{name:"Leo",emoji:"♌"},{name:"Virgo",emoji:"♍"},
        {name:"Libra",emoji:"♎"},{name:"Scorpio",emoji:"♏"},{name:"Sagittarius",emoji:"♐"},
        {name:"Capricorn",emoji:"♑"},{name:"Aquarius",emoji:"♒"},{name:"Pisces",emoji:"♓"}
    ];
    const ttiSigns=[
        {name:"Mouse",emoji:"🐭"},{name:"Cow",emoji:"🐮"},{name:"Tiger",emoji:"🐯"},
        {name:"Rabbit",emoji:"🐰"},{name:"Dragon",emoji:"🐲"},{name:"Snake",emoji:"🐍"},
        {name:"Horse",emoji:"🐴"},{name:"Sheep",emoji:"🐑"},{name:"Monkey",emoji:"🐵"},
        {name:"Rooster",emoji:"🐔"},{name:"Dog",emoji:"🐶"},{name:"Pig",emoji:"🐷"}
    ];

    let meSign=null,partnerSign=null;

    function renderSigns(containerId,signs){
        const c=document.getElementById(containerId);
        c.innerHTML=signs.map(s=>`<div class="sign-btn" onclick="selectSign('${containerId}','${s.name}',this)"><span class="emoji">${s.emoji}</span>${s.name}</div>`).join('');
    }

    function switchType(who,type,btn){
        btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        const id=who+'-signs';
        renderSigns(id,type==='tti'?ttiSigns:zodiacSigns);
        if(who==='me')meSign=null;else partnerSign=null;
        updateBtn();
    }

    function selectSign(containerId,name,el){
        document.querySelectorAll(`#${containerId} .sign-btn`).forEach(b=>b.classList.remove('selected'));
        el.classList.add('selected');
        if(containerId.startsWith('me'))meSign=name;else partnerSign=name;
        updateBtn();
    }

    function updateBtn(){
        document.getElementById('checkBtn').disabled=!(meSign&&partnerSign);
    }

    function checkCompatibility(){
        const seed=(meSign+partnerSign).split('').reduce((a,c)=>a+c.charCodeAt(0),0);
        const r=n=>((seed*n+37)%100);
        const love=Math.max(30,Math.min(99,r(7)));
        const friend=Math.max(30,Math.min(99,r(13)));
        const biz=Math.max(30,Math.min(99,r(23)));
        const total=Math.round((love+friend+biz)/3);

        const loveColor=love>70?'#ff6b9d':'#ffdd57';
        const friendColor=friend>70?'#4ecdc4':'#ffdd57';
        const bizColor=biz>70?'#a29bfe':'#ffdd57';

        const tips=[
            "You complement each other's strengths!",
            "Communication is key for this pairing.",
            "Great energy when you work together!",
            "Give each other space to grow.",
            "A powerful connection with deep understanding.",
            "Trust builds over time with this match.",
        ];
        const tip=tips[seed%tips.length];

        const d=document.getElementById('result');
        d.style.display='block';
        d.innerHTML=`
            <h2>${meSign} & ${partnerSign}</h2>
            <h2 style="font-size:2.5em;color:${total>70?'#ff6b9d':'#ffdd57'}">${total}%</h2>
            <div class="score-label"><span>Love</span><span>${love}%</span></div>
            <div class="score-bar"><div class="score-fill" style="width:${love}%;background:${loveColor}"></div></div>
            <div class="score-label"><span>Friendship</span><span>${friend}%</span></div>
            <div class="score-bar"><div class="score-fill" style="width:${friend}%;background:${friendColor}"></div></div>
            <div class="score-label"><span>Business</span><span>${biz}%</span></div>
            <div class="score-bar"><div class="score-fill" style="width:${biz}%;background:${bizColor}"></div></div>
            <div class="result-text">${tip}</div>
            <div style="text-align:center"><a class="share-btn" href="https://twitter.com/intent/tweet?text=My+zodiac+compatibility+with+${partnerSign}+is+${total}%25!+Check+yours+at+todayfortune.net/compatibility.html" target="_blank">Share Result</a></div>
        `;
        d.scrollIntoView({behavior:'smooth'});
    }

    // Init
    renderSigns('me-signs',zodiacSigns);
    renderSigns('partner-signs',zodiacSigns);
    </script>
</body>
</html>
