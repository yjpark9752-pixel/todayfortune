        <a href="/compatibility.html" style="background:#ffdd57;color:#111;border:1px solid #ffdd57;padding:8px 20px;border-radius:25px;text-decoration:none;font-size:.85em;font-weight:bold">Compatibility</a>

    <div class="container">
        <div class="input-box">
            <label>Your Birthday</label>
            <div style="display:flex;gap:6px"><input type="number" id="myMonth" placeholder="Month" min="1" max="12" style="flex:1;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-size:1em;box-sizing:border-box" onchange="calcSign('my')"><input type="number" id="myDay" placeholder="Day" min="1" max="31" style="flex:1;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-size:1em;box-sizing:border-box" onchange="calcSign('my')"><input type="number" id="myYear" placeholder="Year" min="1940" max="2026" style="flex:1;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-size:1em;box-sizing:border-box" onchange="calcSign('my')"></div>
            <div class="auto-result" id="myResult">
                <span class="emoji" id="myEmoji"></span>
                <span class="info" id="myInfo"></span>
            </div>
        </div>
        <div class="input-box">
            <label>Partner's Birthday</label>
            <div style="display:flex;gap:6px"><input type="number" id="partnerMonth" placeholder="Month" min="1" max="12" style="flex:1;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-size:1em;box-sizing:border-box" onchange="calcSign('partner')"><input type="number" id="partnerDay" placeholder="Day" min="1" max="31" style="flex:1;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-size:1em;box-sizing:border-box" onchange="calcSign('partner')"><input type="number" id="partnerYear" placeholder="Year" min="1940" max="2026" style="flex:1;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-size:1em;box-sizing:border-box" onchange="calcSign('partner')"></div>
            <div class="auto-result" id="partnerResult">
                <span class="emoji" id="partnerEmoji"></span>
                <span class="info" id="partnerInfo"></span>
            </div>

        <button class="check-btn" id="checkBtn" onclick="checkCompatibility()" disabled>Check Compatibility!</button>

    <div style="text-align:center;padding:20px"><a href="/" style="color:#ffdd57;text-decoration:none">← Back to Today's Horoscope</a></div>

    <script>
    const zodiacData=[
        {name:"Capricorn",emoji:"♑",start:[1,1],end:[1,19]},
        {name:"Aquarius",emoji:"♒",start:[1,20],end:[2,18]},
        {name:"Pisces",emoji:"♓",start:[2,19],end:[3,20]},
        {name:"Aries",emoji:"♈",start:[3,21],end:[4,19]},
        {name:"Taurus",emoji:"♉",start:[4,20],end:[5,20]},
        {name:"Gemini",emoji:"♊",start:[5,21],end:[6,20]},
        {name:"Cancer",emoji:"♋",start:[6,21],end:[7,22]},
        {name:"Leo",emoji:"♌",start:[7,23],end:[8,22]},
        {name:"Virgo",emoji:"♍",start:[8,23],end:[9,22]},
        {name:"Libra",emoji:"♎",start:[9,23],end:[10,22]},
        {name:"Scorpio",emoji:"♏",start:[10,23],end:[11,21]},
        {name:"Sagittarius",emoji:"♐",start:[11,22],end:[12,21]},
        {name:"Capricorn",emoji:"♑",start:[12,22],end:[12,31]}
    ];
    const ttiData=[
        {name:"Mouse",emoji:"🐭"},{name:"Cow",emoji:"🐮"},{name:"Tiger",emoji:"🐯"},
        {name:"Rabbit",emoji:"🐰"},{name:"Dragon",emoji:"🐲"},{name:"Snake",emoji:"🐍"},
        {name:"Horse",emoji:"🐴"},{name:"Sheep",emoji:"🐑"},{name:"Monkey",emoji:"🐵"},
        {name:"Rooster",emoji:"🐔"},{name:"Dog",emoji:"🐶"},{name:"Pig",emoji:"🐷"}
    ];

    let myData=null, partnerData=null;

    function getZodiac(m,d){
        for(const z of zodiacData){
            const afterStart=m>z.start[0]||(m===z.start[0]&&d>=z.start[1]);
            const beforeEnd=m<z.end[0]||(m===z.end[0]&&d<=z.end[1]);
            if(afterStart&&beforeEnd)return z;
        }
        return zodiacData[0];
    }

    function getTti(year){
        const idx=(year-4)%12;
        return ttiData[idx>=0?idx:idx+12];
    }

    function calcSign(who){
        
                
        const pfx=who==='my'?'my':'partner';const year=parseInt(document.getElementById(pfx+'Year').value),month=parseInt(document.getElementById(pfx+'Month').value),day=parseInt(document.getElementById(pfx+'Day').value);if(!year||!month||!day)return;
        const zodiac=getZodiac(month,day);
        const tti=getTti(year);

        const data={zodiac,tti,year,month,day};
        if(who==='my')myData=data; else partnerData=data;

        const resultDiv=document.getElementById(who==='my'?'myResult':'partnerResult');
        const emojiEl=document.getElementById(who==='my'?'myEmoji':'partnerEmoji');
        const infoEl=document.getElementById(who==='my'?'myInfo':'partnerInfo');

        emojiEl.textContent=zodiac.emoji+' '+tti.emoji;
        infoEl.textContent=` ${zodiac.name} + ${tti.name} (${year})`;
        resultDiv.style.display='block';

        document.getElementById('checkBtn').disabled=!(myData&&partnerData);
    }

    
        const loveTips=['Your emotional connection runs deep. You understand each other\'s needs intuitively and create a warm, nurturing bond.','There\'s a magnetic attraction between you two. Your chemistry is undeniable, and passion flows naturally.','Love grows slowly but steadily in this pairing. Give it time, and you\'ll discover a beautiful depth.','You bring out the best in each other romantically. This is a connection that can stand the test of time.','Your love language may differ, but the effort you put in makes all the difference. Communication is key.'];
        const friendTips=['As friends, you\'re the dynamic duo everyone envies. Your energy together is contagious and uplifting.','Your friendship is built on mutual trust and respect. You can count on each other through thick and thin.','You challenge each other to grow, which makes this friendship both exciting and meaningful.','Laughter comes easy when you\'re together. This is a friendship that brings genuine joy.','You complement each other perfectly - where one is weak, the other is strong.'];
        const bizTips=['In business, you make a powerful team. Your combined skills cover all the bases for success.','Your professional chemistry is excellent. Together, you can tackle projects that seem impossible alone.','Business ventures between you two have great potential. Trust each other\'s judgment and go for it.','You balance risk and caution well together. This makes for smart, strategic business decisions.','Your work styles may differ, but that\'s your strength. Different perspectives lead to better outcomes.'];

        function checkCompatibility(){
        if(!myData||!partnerData)return;
        const m=myData, p=partnerData;

        // Calculate scores based on zodiac + tti combination
        const seed=(m.zodiac.name+p.zodiac.name+m.tti.name+p.tti.name).split('').reduce((a,c)=>a+c.charCodeAt(0),0);
        const r=n=>Math.max(25,Math.min(99,((seed*n+37)%75)+25));
        const love=r(7), friend=r(13), biz=r(23);
        const total=Math.round((love*0.4+friend*0.3+biz*0.3));

        const color=total>75?'#ff6b9d':total>50?'#ffdd57':'#4ecdc4';

        
        

        const d=document.getElementById('result');
        d.style.display='block';
        d.innerHTML=`
            <div class="vs-display">
                <span class="emoji">${m.zodiac.emoji}${m.tti.emoji}</span>
                <span style="color:#ff6b9d;margin:0 10px">♥</span>
                <span class="emoji">${p.zodiac.emoji}${p.tti.emoji}</span>
            </div>
            <h2>${m.zodiac.name} & ${p.zodiac.name}</h2>
            <h2 style="font-size:.9em;color:#aaa">${m.tti.name} & ${p.tti.name}</h2>
            <div class="big-score" style="color:${color}">${total}%</div>
            <div class="score-section">
                <div class="score-label"><span>Love</span><span>${love}%</span></div>
                <div class="score-bar"><div class="score-fill" style="width:${love}%;background:#ff6b9d"></div></div>
                <div class="score-label"><span>Friendship</span><span>${friend}%</span></div>
                <div class="score-bar"><div class="score-fill" style="width:${friend}%;background:#4ecdc4"></div></div>
                <div class="score-label"><span>Business</span><span>${biz}%</span></div>
                <div class="score-bar"><div class="score-fill" style="width:${biz}%;background:#a29bfe"></div></div>
            </div>
            <div class="result-text">
                <p style="margin-bottom:10px"><b style="color:#ff6b9d">Love:</b> ${loveTips[seed%loveTips.length]}</p>
                <p style="margin-bottom:10px"><b style="color:#4ecdc4">Friendship:</b> ${friendTips[seed%friendTips.length]}</p>
                <p><b style="color:#a29bfe">Business:</b> ${bizTips[seed%bizTips.length]}</p>
            </div>
            <div class="share-row">
                <a class="share-btn" style="background:#1DA1F2" href="https://twitter.com/intent/tweet?text=${encodeURIComponent(`Our compatibility: ${total}%! ${m.zodiac.name} × ${p.zodiac.name} #TodayFortune #zodiac`)}&url=https://todayfortune.net/compatibility.html" target="_blank">Twitter</a>
                <a class="share-btn" style="background:#000;border:1px solid #333" href="https://www.threads.net/intent/post?text=${encodeURIComponent(`Our compatibility: ${total}%! ${m.zodiac.emoji}${m.tti.emoji} × ${p.zodiac.emoji}${p.tti.emoji} #TodayFortune`)}" target="_blank">Threads</a>
                <a class="share-btn" style="background:linear-gradient(135deg,#ff6b9d,#c77dff)" href="sms:?body=${encodeURIComponent(`I checked our compatibility and the results are amazing! 😍 See for yourself 👉 https://todayfortune.net/compatibility.html`)}" target="_blank">💌 Send to Partner</a>
            </div>
        `;
        d.scrollIntoView({behavior:'smooth'});
    }
    </script>
